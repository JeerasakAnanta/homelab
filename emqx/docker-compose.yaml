services:
  emqx:
    image: emqx/emqx:latest
    container_name: emqx
    restart: always
    ports:
      - "1883:1883"      # MQTT TCP Port
      - "8883:8883"      # MQTT SSL Port
      - "8083:8083"      # MQTT WebSockets Port
      - "8084:8084"      # MQTT WSS (Secure WebSockets) Port
      - "18083:18083"    # Dashboard UI (Web GUI)
    volumes:
      - emqx_data:/opt/emqx/data
      - emqx_log:/opt/emqx/log
      - emqx_etc:/opt/emqx/etc
    environment:
      - "EMQX_NODE_NAME=emqx@node1.emqx.io"
      - "EMQX_CLUSTER__DISCOVERY_STRATEGY=static"

volumes:
  emqx_data:
  emqx_log:
  emqx_etc: