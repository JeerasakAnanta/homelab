services:
  jenkins:
    image: jenkins/jenkins:lts 
    container_name: jenkins-server
    restart: unless-stopped
    privileged: true
    user: root
    environment:
      - JAVA_OPTS=-Djenkins.install.runSetupWizard=false
      - DOCKER_HOST=unix:///var/run/docker.sock
    ports:
      - "8888:8080"
      - "50000:50000"
    volumes:
      - jenkins_home:/var/jenkins_home
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - jenkins_network
    healthcheck:
      # Changed port from 8085 to 8080 to match Jenkins' internal port
      test: [ "CMD-SHELL", "curl -f http://localhost:8080/login || exit 1" ] 
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 90s

networks:
  jenkins_network:
    driver: bridge

volumes:
  jenkins_home:
    driver: local